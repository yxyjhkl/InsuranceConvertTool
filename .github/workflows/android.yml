name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: "34.0.0"

      - name: Accept licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b682gf2a5b4" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb18af7dfe6a" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "e9acab5b5fbb561ffb6e1d3" >> $ANDROID_HOME/licenses/android-sdk-license

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython
          pip install pdfplumber openpyxl pillow pdfminer.six

      - name: Build APK with p4a
        run: |
          pip install python-for-android
          p4a apk --name jinzunfenhong --package com.insurance.jinzunfenhong --version 2.0.0 --direction .
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jinzunfenhong-debug.apk
          path: bin/*.apk