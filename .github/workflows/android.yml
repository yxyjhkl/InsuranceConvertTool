name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK (Java 8)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Fix Android SDK tools
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          
          # Remove cmdline-tools 16.0 if exists (requires JDK 17)
          rm -rf $ANDROID_HOME/cmdline-tools/16.0
          
          # Create symlink so p4a can find tools in expected location
          rm -rf $ANDROID_HOME/tools
          ln -sf $ANDROID_HOME/cmdline-tools/latest $ANDROID_HOME/tools
          
          # Verify structure
          ls -la $ANDROID_HOME/cmdline-tools/
          ls -la $ANDROID_HOME/tools/bin/

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Accept licenses
          mkdir -p $ANDROID_HOME/licenses
          echo -e "\n24333f8a63b682gf2a5b4\nd56f5187479451eabf01fb18af7dfe6a\ne9acab5b5fbb561ffb6e1d3" > $ANDROID_HOME/licenses/android-sdk-license
          
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtool libtool-bin autoconf automake m4 help2man pkg-config

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython
          pip install "python-for-android==2022.3.13"
          pip install pdfplumber openpyxl pillow pdfminer.six
          pip install kivy==2.3.1

      - name: Prebuild bootstrap
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/
          ls -la $ANDROID_HOME/cmdline-tools/*/bin/ 2>/dev/null || true
          ls -la $ANDROID_HOME/tools/bin/ 2>/dev/null || true
          p4a create --name jinzunfenhong --package com.insurance.jinzunfenhong --version 2.0.0 --direction . --arch arm64-v8a --android-api 34 --sdk-dir $ANDROID_HOME
        env:
          P4A_PYTHON: "python3.11"
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Copy source files
        run: |
          cp -r . src/ .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/jinzunfenhong/
          cp -r controllers/ .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/jinzunfenhong/
          cp -r screens/ .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/jinzunfenhong/
          cp -r data/ .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/jinzunfenhong/
          cp -r assets/ .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/jinzunfenhong/
          cp main.py .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/jinzunfenhong/
          cp *.kv .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/jinzunfenhong/ 2>/dev/null || true

      - name: Build APK
        run: |
          p4a apk --name jinzunfenhong --package com.insurance.jinzunfenhong --version 2.0.0 --direction . --arch arm64-v8a --android-api 34 --sdk-dir $ANDROID_HOME
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jinzunfenhong-debug.apk
          path: bin/*.apk