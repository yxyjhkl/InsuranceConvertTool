name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libncurses5:i386 \
            libstdc++6:i386 \
            libgtk2.0-0:i386 \
            libpangox-1.0-0:i386 \
            libpangoxft-1.0-0:i386 \
            libidn11:i386 \
            python3 \
            python3-dev \
            openjdk-17-jdk \
            unzip \
            zlib1g-dev \
            zlib1g:i386

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37 pillow==10.3.0

      - name: Setup Android SDK
        run: |
          mkdir -p "$HOME/.buildozer/android/platform"
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -O commandlinetools.zip
          unzip -q commandlinetools.zip -d "$HOME/.buildozer/android/platform"
          rm commandlinetools.zip

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jinzunfenhong-debug.apk
          path: bin/*.apk

      - name: Show logs
        if: failure()
        run: |
          ls -la
          ls -la bin/ 2>/dev/null || true
          cat .buildozer/log 2>/dev/null | tail -300 || true
